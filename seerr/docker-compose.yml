services:
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    hostname: seerr
    restart: unless-stopped
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    user: $PUID:$PGID
    environment:
      - TZ=$TZ
    volumes:
      - $DOCKER_DATA/seerr/config:/app/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.seerr.loadbalancer.server.port=5055"
      - "traefik.http.routers.seerr.entrypoints=websecure"
      - "traefik.http.routers.seerr.rule=Host(`$SUBDOMAIN.$DOMAIN_NAME`)"
      - "traefik.http.routers.seerr.tls.domains[0].main=$DOMAIN_NAME"
      - "traefik.http.routers.seerr.tls.domains[0].sans=*.$DOMAIN_NAME"
      - "traefik.http.routers.seerr.tls.certresolver=letsencrypt"
      - "traefik.http.routers.seerr.middlewares=error-pages,security-headers"

networks:
  default:
    name: $DEFAULT_NETWORK
    external: true
